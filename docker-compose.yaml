services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - SERVICE_FQDN_FRONTEND_80
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  api:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    environment:
      - SERVICE_FQDN_API_3000
      - PORT=3000
      - MCP_BEARER_TOKEN=${MCP_BEARER_TOKEN}
      - NODE_ENV=production
      - CACHE_TTL_MS=${CACHE_TTL_MS:-86400000}
      - CACHE_MAX_ENTRIES=${CACHE_MAX_ENTRIES:-2000}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
